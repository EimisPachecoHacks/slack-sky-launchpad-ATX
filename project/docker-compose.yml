version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Backend service (example configuration).
  # The canonical GPU stack is docker/docker-compose.amd.yml — this is a
  # lightweight local variant that points at a reachable AMD inference endpoint.
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER=amd
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-gemma4:31b}
      - EMBED_MODEL=${EMBED_MODEL:-mxbai-embed-large}
    command: sh -c "pip install -r requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  default:
    name: skyrchitect-network
