version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Backend service. Qwen Cloud is a hosted API, so the backend needs no GPU —
  # it just needs DASHSCOPE_API_KEY to reach Qwen models. This same image is
  # what deploys to Alibaba Cloud (ECS / Simple Application Server) for the
  # hackathon's proof-of-deployment.
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER=qwen
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen3.7-max}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-qwen3.7-plus}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-v4}
    command: sh -c "pip install -r requirements.txt && uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  default:
    name: skyrchitect-network
