# Sky Launchpad on AMD — the full stack, containerized.
#
#   docker compose -f docker/docker-compose.amd.yml up
#
# THIS IS THE DROPLET PATH. It needs a real Docker host: an AMD Developer Cloud
# GPU Droplet, where you have root, Docker, and a public IP. The free hackathon
# pod (notebooks.amd.com) is a managed JupyterLab container with no `docker run`
# — use `bash scripts/pod_up.sh` there. Both paths serve the SAME models, so the
# vector index stays valid across them.
#
# AMD silicon is load-bearing for BOTH halves of the self-improving loop:
#   ollama  -> gemma3:12b generates architectures, repairs failed Terraform, and
#              reads architecture diagrams (it is natively multimodal)
#           -> mxbai-embed-large (1024-d) embeds learned skills so Atlas Vector
#              Search can retrieve the right past failure
#   whisper -> speech-to-text for voice input, on the same GPU
#
# Kill the GPU services and the app still runs, but vector retrieval degrades to
# lexical matching — the embeddings only exist because of the GPU.
#
# The 8h/24h budget only burns while these are up. `docker compose down` stops it.

services:
  ollama:
    image: ollama/ollama:rocm
    container_name: sky-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # ROCm device passthrough. Without these the container cannot see the GPU
    # and Ollama silently falls back to CPU.
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    ipc: host
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD-SHELL", "ollama --version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Pulls the two models once, then exits. Keeps `ollama` itself stateless.
  ollama-pull:
    image: ollama/ollama:rocm
    container_name: sky-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull gemma3:12b && ollama pull mxbai-embed-large && echo 'models ready'"
    restart: "no"

  whisper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.whisper
    image: sky-whisper:rocm
    container_name: sky-whisper
    ports:
      - "8100:8100"
    environment:
      WHISPER_MODEL: openai/whisper-large-v3
      HF_HOME: /models
    volumes:
      - hf-cache:/models
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    ipc: host
    shm_size: 8gb
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    image: sky-backend:latest
    container_name: sky-backend
    ports:
      - "8080:8080"
    environment:
      LLM_PROVIDER: amd
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: gemma3:12b
      LLM_VISION_MODEL: gemma3:12b
      EMBED_BASE_URL: http://ollama:11434/v1
      EMBED_MODEL: mxbai-embed-large
      EMBED_DIMENSIONS: "1024"
      # mxbai-embed-large is fixed-width, not Matryoshka: sending `dimensions` 422s.
      EMBED_SEND_DIMENSIONS: "false"
      LLM_AUDIO_BASE_URL: http://whisper:8100/v1
      LLM_TRANSCRIBE_MODEL: openai/whisper-large-v3
      MONGODB_URI: ${MONGODB_URI:-}
      MONGODB_VECTOR_INDEX: ${MONGODB_VECTOR_INDEX:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      GITLAB_PROJECT_PATH: ${GITLAB_PROJECT_PATH:-}
    depends_on:
      ollama:
        condition: service_healthy
      whisper:
        condition: service_healthy
    # CPU only: no device access. This container is portable to Cloud Run as-is,
    # where you would set LLM_PROVIDER=fireworks (paid) since there is no GPU.

volumes:
  ollama-models:
  hf-cache:
