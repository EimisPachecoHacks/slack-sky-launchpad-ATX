# OpenShell network policy — Sky Launchpad deployer/tester containment.
# Deny-by-default egress. The contained agent (OpenClaw, routed to our
# self-hosted Nemotron) may reach ONLY these endpoints; everything else — any
# exfiltration target, arbitrary host — is refused at the CONNECT layer.
preset:
  name: sky-deployer
  description: "Sky Launchpad autonomous deployer/tester — least-privilege egress"
network_policies:
  sky_deployer:
    name: sky_deployer
    endpoints:
      # The agent's only brain: self-hosted vLLM Nemotron (public team endpoint).
      - host: correspondence-cathedral-locked-whale.trycloudflare.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      # Alibaba Cloud APIs — real infrastructure the deployer operates.
      - host: ecs.ap-southeast-1.aliyuncs.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: vpc.ap-southeast-1.aliyuncs.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      # GitLab — push code + open MR on success. DELETE deliberately not allowed.
      - host: gitlab.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/api/v4/**" }
          - allow: { method: POST, path: "/api/v4/**" }
          - allow: { method: PUT, path: "/api/v4/**" }
      # Learned-skills memory. No DELETE: the agent can learn but never erase it.
      - host: gisrercttnamjfjqrsuu.supabase.co
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/rest/v1/**" }
          - allow: { method: POST, path: "/rest/v1/**" }
          - allow: { method: PATCH, path: "/rest/v1/**" }
      # Terraform provider/registry downloads.
      - host: registry.terraform.io
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: releases.hashicorp.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/bin/python3 }
      - { path: /usr/local/bin/terraform }
      - { path: /usr/bin/git }
