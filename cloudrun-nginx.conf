server {
    listen 8080;
    server_name _;
    client_max_body_size 50M;

    root /var/www/html;
    index index.html;

    # Public, machine-checkable proof that the FastAPI backend is running.
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # The backend's rich status document (provider, model id, llm_connected)
    # lives at the FastAPI root, which "/" below shadows with the React app.
    # Expose it under /api/ so clients (the Slack app's Home tab) can read it.
    location = /api/status {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
